{% set name = "cppTango" %}
{% set version = "9.3.5.dev2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://gitlab.com/tango-controls/cppTango/-/archive/8eb4bdf4ee7c3022084542504142f47fa2d18abb/cpptango-8eb4bdf4ee7c3022084542504142f47fa2d18abb.tar.gz
  sha256: ddf7f013a43d27fb0bf1fab0d92977b1ba409884431c6a321c45e2c2b9f05eec
  patches:
    - windows-lib-names.patch  # [win]

build:
  number: 0
  skip: true  # [osx]
  # Prevent libtango.so.{{ version }}.dbg to be modified
  # Will raise CRC mismatch otherwise!
  binary_relocation:                 # [linux]
    - lib/libtango.so.{{ version }}  # [linux]
  run_exports:
    - {{ pin_subpackage('cpptango', max_pin='x.x') }}

requirements:
  build:
    - cmake
    - make          # [unix]
    - {{ compiler('cxx') }}
    - libtool       # [unix]
    - pkg-config    # [unix]
    # To run clean_dir.py
    - python >=3.6  # [win]
  host:
    - omniorb
    - cppzmq
    - zeromq
    - tango-idl
    - pthreads-win32  # [win]
  run:
    - {{ pin_compatible('omniorb', max_pin='x.x') }}
    # zeromq max_pin set in pin_run_as_build in conda-forge-pinning
    - zeromq
    - {{ pin_compatible('pthreads-win32', min_pin='x.x', max_pin='x.x') }}  # [win]

test:
  commands:
    - test -f ${PREFIX}/lib/libtango${SHLIB_EXT}         # [unix]
    - test -f ${PREFIX}/lib/pkgconfig/tango.pc           # [unix]
    - test -f ${PREFIX}/include/tango/tango.h            # [unix]
    - if not exist %LIBRARY_BIN%\\tango.dll exit 1       # [win]
    - if not exist %LIBRARY_INC%\\tango\\tango.h exit 1  # [win]

outputs:
  - name: cpptango
    files:
      - lib/libtango.so                     # [linux]
      - lib/libtango.so.9                   # [linux]
      - lib/libtango.so.{{ version }}       # [linux]
      - lib/pkgconfig/tango.pc              # [linux]
      - include/tango                       # [linux]
      - Library/bin/tango.dll               # [win]
      - Library/lib/tango.lib               # [win]
      - Library/include                     # [win]

  - name: cpptango-dbg
    requirements:
      run:
        - {{ pin_subpackage('cpptango', exact=True) }}
    files:
      - lib/libtango.so.{{ version }}.dbg  # [linux]
      - Library/bin/tango.pdb              # [win]
    test:
      commands:
        - test -f ${PREFIX}/lib/libtango${SHLIB_EXT}.${PKG_VERSION}.dbg  # [linux]
        - if not exist %LIBRARY_BIN%\\tango.pdb exit 1                   # [win]

about:
  home: https://www.tango-controls.org
  license: LGPL-3.0-or-later
  license_file: LICENSE
  summary: 'Tango-Controls C++ library'
  description: |
   This is the Tango-Controls C++ library (a.k.a. cppTango).
   Tango-Controls is a software toolkit for building control systems.
  dev_url: https://gitlab.com/tango-controls/cppTango
  doc_url: https://tango-controls.github.io/cppTango-docs
  doc_source_url: https://github.com/tango-controls/cppTango-docs

extra:
  recipe-maintainers:
    - beenje
    - bourtemb
